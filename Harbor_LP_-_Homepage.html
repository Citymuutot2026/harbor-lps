"<!DOCTYPE html>\n<html lang=\"fi\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover\">\n<title>Kotisivut pienyritykselle — valmiit huomenna. 19,90 €/kk · Harbor</title>\n<meta name=\"description\" content=\"Annat osoitteesi. Me rakennamme sivut. Pidät — maksat 19,90 €/kk. Et pidä — et maksa mitään. Pienyrityksen kotisivut, ilman kotisivukonetta.\">\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<style>/* cyrillic-ext */\n/* cyrillic */\n/* latin-ext */\n/* latin */\n/* cyrillic-ext */\n/* cyrillic */\n/* latin-ext */\n/* latin */\n/* cyrillic-ext */\n/* cyrillic */\n/* greek-ext */\n/* greek */\n/* vietnamese */\n/* latin-ext */\n/* latin */\n/* cyrillic-ext */\n/* cyrillic */\n/* greek-ext */\n/* greek */\n/* vietnamese */\n/* latin-ext */\n/* latin */\n/* cyrillic-ext */\n/* cyrillic */\n/* greek-ext */\n/* greek */\n/* vietnamese */\n/* latin-ext */\n/* latin */\n/* cyrillic-ext */\n/* cyrillic */\n/* greek-ext */\n/* greek */\n/* vietnamese */\n/* latin-ext */\n/* latin */\n/* cyrillic-ext */\n/* cyrillic */\n/* greek-ext */\n/* greek */\n/* vietnamese */\n/* latin-ext */\n/* latin */\n/* cyrillic-ext */\n/* cyrillic */\n/* greek-ext */\n/* greek */\n/* vietnamese */\n/* latin-ext */\n/* latin */\n</style>\n<style>/* Harbor design tokens — extracted/inferred from hostharbor.eu + user-chosen teal */\n:root {\n  /* Brand palette */\n  --hb-ink: #0a1f1a;            /* deep harbor navy/green */\n  --hb-ink-2: #1a2f29;\n  --hb-ink-soft: #4a5a55;\n  --hb-ink-mute: #7a8a85;\n  --hb-paper: #fbfaf6;          /* warm off-white */\n  --hb-paper-2: #f4f1ea;\n  --hb-card: #ffffff;\n  --hb-rule: #e4dfd5;\n  --hb-rule-soft: #ede8de;\n  --hb-accent: #0ec49f;         /* user-selected teal */\n  --hb-accent-deep: #0a8f73;\n  --hb-accent-soft: #d6f5ec;\n  --hb-accent-tint: #effaf6;\n  --hb-warn: #c8501f;\n  --hb-shadow-1: 0 1px 2px rgba(10,31,26,0.06), 0 2px 6px rgba(10,31,26,0.04);\n  --hb-shadow-2: 0 4px 12px rgba(10,31,26,0.08), 0 12px 32px rgba(10,31,26,0.06);\n  --hb-shadow-cta: 0 4px 14px rgba(14,196,159,0.32);\n\n  --hb-r-sm: 6px;\n  --hb-r-md: 10px;\n  --hb-r-lg: 16px;\n\n  --hb-font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;\n  --hb-font-hand: 'Caveat', cursive;\n  --hb-font-display: 'Inter', system-ui, sans-serif; /* tight, heavy Inter */\n}\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  font-family: var(--hb-font-sans);\n  color: var(--hb-ink);\n  background: var(--hb-paper);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\na { color: inherit; text-decoration: none; }\nbutton { font-family: inherit; cursor: pointer; }\n\n.hb-container { max-width: 420px; margin: 0 auto; background: var(--hb-paper); min-height: 100vh; }\n\n/* ── Top bar ── */\n.hb-top {\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 14px 20px;\n  background: var(--hb-paper);\n  position: sticky; top: 0; z-index: 20;\n  border-bottom: 1px solid var(--hb-rule-soft);\n  backdrop-filter: blur(8px);\n}\n.hb-logo { display: flex; align-items: center; gap: 8px; font-weight: 700; letter-spacing: -0.3px; font-size: 17px; }\n.hb-logo-mark {\n  width: 26px; height: 26px; border-radius: 7px;\n  background: var(--hb-ink); color: var(--hb-paper);\n  display: flex; align-items: center; justify-content: center;\n  font-weight: 800; font-size: 13px; letter-spacing: -0.5px;\n}\n.hb-top-cta {\n  font-size: 13px; font-weight: 600;\n  background: var(--hb-ink); color: var(--hb-paper);\n  padding: 8px 14px; border-radius: 999px; border: none;\n}\n.hb-lang { font-size: 12px; color: var(--hb-ink-mute); margin-right: 8px; font-weight: 500; }\n.hb-lang strong { color: var(--hb-ink); }\n\n/* ── Buttons ── */\n.hb-btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 8px;\n  width: 100%; padding: 16px 20px; border-radius: var(--hb-r-md);\n  font-weight: 600; font-size: 15px; line-height: 1;\n  border: none; transition: transform .12s ease, box-shadow .12s ease;\n}\n.hb-btn:active { transform: translateY(1px); }\n.hb-btn-primary {\n  background: var(--hb-accent); color: var(--hb-ink);\n  box-shadow: var(--hb-shadow-cta);\n}\n.hb-btn-primary:hover { background: var(--hb-accent-deep); color: var(--hb-paper); }\n.hb-btn-dark { background: var(--hb-ink); color: var(--hb-paper); }\n.hb-btn-ghost { background: transparent; color: var(--hb-ink); border: 1.5px solid var(--hb-ink); }\n\n.hb-btn-arrow::after { content: \"→\"; }\n\n/* ── Section base ── */\n.hb-section { padding: 36px 22px; }\n.hb-section-tight { padding: 28px 22px; }\n.hb-section-tinted { background: var(--hb-paper-2); }\n.hb-section-dark { background: var(--hb-ink); color: var(--hb-paper); }\n.hb-section-accent { background: var(--hb-accent-tint); }\n\n.hb-eyebrow {\n  font-size: 11px; font-weight: 700; letter-spacing: 1.4px;\n  text-transform: uppercase; color: var(--hb-accent-deep);\n  display: inline-flex; align-items: center; gap: 6px;\n}\n.hb-eyebrow::before { content: \"\"; width: 8px; height: 8px; background: var(--hb-accent); border-radius: 50%; }\n.hb-section-dark .hb-eyebrow { color: var(--hb-accent); }\n\n.hb-h1 {\n  font-size: 34px; font-weight: 800; line-height: 1.04; letter-spacing: -1.2px;\n  margin: 14px 0 14px; text-wrap: balance;\n}\n.hb-h2 { font-size: 26px; font-weight: 800; line-height: 1.1; letter-spacing: -0.6px; margin: 0 0 12px; text-wrap: balance; }\n.hb-h3 { font-size: 18px; font-weight: 700; line-height: 1.25; letter-spacing: -0.3px; margin: 0 0 6px; }\n.hb-lede { font-size: 16px; line-height: 1.5; color: var(--hb-ink-soft); margin: 0 0 18px; }\n.hb-section-dark .hb-lede { color: rgba(251,250,246,0.72); }\n\n.hb-trust-row {\n  display: flex; flex-wrap: wrap; gap: 12px 18px;\n  font-size: 12px; color: var(--hb-ink-mute);\n  ma
